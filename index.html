<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta 3D SASS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>


<body>

<main class="container">
    <section class="extra">

        <h2>Elemento Grid</h2>

        <p>
            Este bloque demuestra la flexibilidad de CSS Grid.
        </p>

    </section>



    <section class="info">

        <h2>Información</h2>

        <p>
            Diseño responsive con grid-template-areas.
        </p>

    </section>  

    <section 
        class="card"
        tabindex="0"
        aria-label="Tarjeta interactiva 3D"
    >

        <div class="card__front">
            <h2>Frontend</h2>
            <p>Pasá el mouse o presioná Tab</p>
        </div>


        <div class="card__back">
            <h2>CSS 3D</h2>
            <p>Perspective + Preserve 3D</p>
        </div>


    </section>



    <section class="form">

<h2>Contacto</h2>


<form>


<label for="name">
Nombre
</label>


<input 
id="name"
name="name"
type="text"
placeholder="Ingrese su nombre"
required
minlength="3"
aria-describedby="name-error"
>


<span 
class="error-message"
id="name-error"
aria-live="polite"
>
El nombre debe tener al menos 3 caracteres.
</span>



<label for="email">
Email
</label>


<input
id="email"
name="email"
type="email"
placeholder="correo@email.com"
required
aria-describedby="email-error"
>


<span
class="error-message"
id="email-error"
aria-live="polite"
>
Ingrese un email válido.
</span>



<button type="submit">
Enviar
</button>


</form>


</section>


</main>

<script src="script.js"></script>
</body>
</html>
